<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Kas IASS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        :root {
            --bg-color: #F2F2F7; --card-bg: #FFFFFF; --iass-green: #057234;
            --iass-orange: #F78E1E; --text-main: #1C1C1E; --text-muted: #8E8E93;
            --border-color: #C6C6C8;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 0 0 70px 0; -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 450px; margin: auto; padding: 0 15px; }
        
        #statusJaringan { 
            position: fixed; top: 15px; right: 15px; z-index: 1000;
            font-size: 11px; padding: 5px 10px; border-radius: 20px; font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status-online { background-color: #E5F3EB; color: var(--iass-green); }
        .status-offline { background-color: #FCECEB; color: #D73A49; }

        #btnLogout {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            font-size: 11px; padding: 5px 10px; border-radius: 20px; font-weight: 600;
            background-color: #FCECEB; color: #D73A49; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer; display: none;
        }

        .header { 
            position: sticky; top: 0; z-index: 100; text-align: center; 
            padding: 25px 0 15px 0; margin-bottom: 10px;
            background: linear-gradient(to bottom, rgba(242, 242, 247, 0.95) 75%, rgba(242, 242, 247, 0) 100%);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .header-logo { width: 75%; max-width: 250px; height: auto; margin: 0 auto; display: block; }
        .header h2 { margin: 10px 0 0 0; font-weight: 600; color: var(--iass-green); font-size: 20px; }

        .custom-select-trigger {
            width: 100%; padding: 14px 15px; font-size: 15px; border: 1px solid var(--border-color);
            border-radius: 10px; background-color: var(--card-bg); color: var(--text-main);
            margin-bottom: 15px; font-weight: 600; cursor: pointer; text-align: left;
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
        }
        .custom-select-trigger::after { content: "▼"; font-size: 12px; color: var(--text-muted); }

        .card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .form-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-color); }
        .form-row:last-child { border-bottom: none; }
        .form-row label { width: 35%; font-size: 14px; font-weight: 500; }
        .form-input-container { width: 65%; display: flex; flex-direction: column; }
        
        input[type="text"], input[type="password"] {
            width: 100%; border: none; font-size: 15px; outline: none; text-align: right; background: transparent; color: var(--text-main);
        }
        
        .login-input { text-align: left !important; padding: 15px !important; border-bottom: 1px solid var(--border-color) !important; border-radius: 0 !important;}
        
        .radio-group { display: flex; justify-content: flex-end; gap: 15px; }
        .radio-group label { display: flex; align-items: center; cursor: pointer; font-size: 14px; }
        .radio-group input[type="radio"] { margin-right: 5px; accent-color: var(--iass-orange); transform: scale(1.2); }

        button.btn-primary { width: 100%; background-color: var(--iass-orange); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; padding: 14px; cursor: pointer; }
        button.btn-primary:disabled { opacity: 0.6; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .summary-box { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .summary-box.full { grid-column: span 2; background-color: var(--iass-green); color: white; }
        .summary-box p { margin: 0; font-size: 12px; color: var(--text-muted); }
        .summary-box.full p { color: #E5F3EB; }
        .summary-box h3 { margin: 5px 0 0 0; font-size: 17px; }
        .text-masuk { color: var(--iass-green); }
        .text-keluar { color: #D73A49; }

        .history-item { padding: 12px 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--card-bg);}
        .history-item:first-child { border-radius: 12px 12px 0 0; }
        .history-item:last-child { border-bottom: none; border-radius: 0 0 12px 12px; }
        .history-info p { margin: 0; font-size: 14px; font-weight: 500; text-transform: capitalize;}
        .history-info small { color: var(--text-muted); font-size: 12px;}
        .history-amount { font-weight: 600; font-size: 15px;}

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg);
            display: flex; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 0; color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer;
        }
        .nav-icon { width: 22px; height: 22px; margin-bottom: 4px; stroke: var(--text-muted); }
        .nav-item.active { color: var(--iass-green); }
        .nav-item.active .nav-icon { stroke: var(--iass-green); }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 999; display: none; align-items: flex-end; justify-content: center; }
        .modal-sheet { background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; animation: slideUp 0.3s ease-out; max-height: 80vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 15px; color: var(--text-main); }
        .modal-option { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 15px; text-align: center; cursor: pointer; }
        .modal-option:last-child { border-bottom: none; }
        .modal-option:active { background-color: var(--bg-color); }
        
        .flatpickr-calendar { font-family: inherit !important; border-radius: 12px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important; border: none !important; }
        .flatpickr-day.selected { background: var(--iass-orange) !important; border-color: var(--iass-orange) !important; }
    </style>
</head>
<body>
    <div id="statusJaringan" class="status-online">Online</div>
    <button id="btnLogout" onclick="logout()">Keluar</button>

    <div class="container">
        <div class="header">
            <img src="logo.png" alt="Logo IASS" class="header-logo">
            <h2 id="pageTitle">Sistem Kas IASS</h2>
            <p id="welcomeMsg" style="font-size:12px; color:var(--text-muted); margin-top:5px; display:none;"></p>
        </div>

        <!-- VIEW: LOGIN -->
        <div id="viewLogin" class="view-section active">
            <div class="card" style="padding: 10px 0;">
                <input type="text" id="loginUser" class="login-input" placeholder="Username" autocomplete="off">
                <input type="password" id="loginPass" class="login-input" placeholder="Password" style="border-bottom:none !important;">
            </div>
            <button onclick="doLogin()" class="btn-primary" id="btnProsesLogin">Masuk Aplikasi</button>
        </div>

        <!-- VIEW: INPUT TRANSAKSI -->
        <div id="viewInput" class="view-section">
            <div id="trigger_cat_in" class="custom-select-trigger" onclick="openModal('cat_in', 'Pilih Kategori Kas')">Buku Kas PW</div>
            <input type="hidden" id="cat_in" value="KAS PW">

            <form id="kasForm">
                <div class="card">
                    <div class="form-row">
                        <label>Tanggal</label>
                        <div class="form-input-container">
                            <input type="text" id="tanggal" required placeholder="Pilih Tanggal">
                            <span id="hijriInfo" style="font-size:12px; color:var(--iass-green); text-align:right; margin-top:4px;"></span>
                        </div>
                    </div>
                    <div class="form-row">
                        <label>Uraian</label>
                        <div class="form-input-container">
                            <input type="text" id="uraian" required placeholder="Contoh: Beli ATK">
                        </div>
                    </div>
                    <div class="form-row">
                        <label>Jenis</label>
                        <div class="form-input-container">
                            <div class="radio-group">
                                <label><input type="radio" name="jenis" value="masuk" required> Masuk</label>
                                <label><input type="radio" name="jenis" value="keluar"> Keluar</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <label>Nominal</label>
                        <div class="form-input-container">
                            <input type="text" id="nominal" required placeholder="0" inputmode="numeric">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="btnSimpan">Simpan Transaksi</button>
            </form>
        </div>

        <!-- VIEW: RIWAYAT & RINGKASAN -->
        <div id="viewRiwayat" class="view-section">
            <div id="trigger_cat_out" class="custom-select-trigger" onclick="openModal('cat_out', 'Lihat Laporan Kas')">Lihat: Kas PW</div>
            <input type="hidden" id="cat_out" value="KAS PW">

            <!-- Dropdown Bulan Dinamis -->
            <div id="wrapper_bulanSheet">
                <div id="trigger_bulanSheet" class="custom-select-trigger" onclick="openModal('bulanSheet', 'Pilih Bulan')">Bulan 2 (Shafar 1448)</div>
                <input type="hidden" id="bulanSheet" value="2/48">
            </div>

            <div class="summary-grid">
                <div class="summary-box full">
                    <p>Total Saldo Akhir</p>
                    <h3 id="sumSaldo">Rp 0</h3>
                </div>
                <div class="summary-box">
                    <p>Pemasukan</p>
                    <h3 id="sumMasuk" class="text-masuk">Rp 0</h3>
                </div>
                <div class="summary-box">
                    <p>Pengeluaran</p>
                    <h3 id="sumKeluar" class="text-keluar">Rp 0</h3>
                </div>
            </div>

            <div id="historyList" style="border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); margin-bottom:20px;">
                <div style="padding:20px; text-align:center; color:gray; font-size:14px; background:white; border-radius:12px;">Memuat data...</div>
            </div>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <div class="bottom-nav" id="bottomNav" style="display:none;">
        <div class="nav-item active" id="navInputBtn" onclick="switchTab('input')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            Input
        </div>
        <div class="nav-item" id="navRiwayatBtn" onclick="switchTab('riwayat')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            Riwayat
        </div>
    </div>

    <!-- Modal Bottom Sheet -->
    <div class="modal-overlay" id="customModal" onclick="closeModal(event)">
        <div class="modal-sheet">
            <div class="modal-title" id="modalTitle">Pilih</div>
            <div id="modalOptions"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/id.js"></script>

    <script>
        const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbyZlyYAVIB3U9jV3BLZOLUS0bXyQaif0pW5v1kfqtmQ73-SREo-b_xFZPlWapuoPbhJtA/exec';
        let tanggalHijriyahFinal = ""; let rawHistoryData = []; let backendSummary = {};

        // --- SISTEM LOGIN ---
        function checkSession() {
            const role = localStorage.getItem('iassRole'); const nama = localStorage.getItem('iassNama');
            if (role) {
                document.getElementById('btnLogout').style.display = 'block';
                document.getElementById('bottomNav').style.display = 'flex';
                document.getElementById('welcomeMsg').style.display = 'block';
                document.getElementById('welcomeMsg').textContent = `Halo, ${toProperCase(nama)} (${role})`;
                
                if (role.toLowerCase() === 'bendahara') { document.getElementById('navInputBtn').style.display = 'flex'; switchTab('input'); } 
                else { document.getElementById('navInputBtn').style.display = 'none'; switchTab('riwayat'); }
            } else {
                document.getElementById('btnLogout').style.display = 'none'; document.getElementById('bottomNav').style.display = 'none';
                document.getElementById('welcomeMsg').style.display = 'none';
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                document.getElementById('viewLogin').classList.add('active'); document.getElementById('pageTitle').textContent = "Masuk Sistem";
            }
        }

        function doLogin() {
            const user = document.getElementById('loginUser').value; const pass = document.getElementById('loginPass').value;
            if(!user || !pass) return alert("Isi Username dan Password!");
            const btn = document.getElementById('btnProsesLogin'); btn.textContent = "Mengecek Akun..."; btn.disabled = true;

            fetch(URL_APPS_SCRIPT, { method: 'POST', body: JSON.stringify({ action: 'login', username: user, password: pass }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    localStorage.setItem('iassRole', res.role); localStorage.setItem('iassNama', res.nama);
                    document.getElementById('loginUser').value = ""; document.getElementById('loginPass').value = ""; checkSession();
                } else { alert(res.message); }
            })
            .catch(() => alert('Gagal terhubung. Pastikan ada sinyal internet.'))
            .finally(() => { btn.textContent = "Masuk Aplikasi"; btn.disabled = false; });
        }
        function logout() { if(confirm("Yakin ingin keluar?")) { localStorage.removeItem('iassRole'); localStorage.removeItem('iassNama'); checkSession(); } }

        // --- KONFIGURASI KALENDER & FORMATTER ---
        const flatpickrConfig = { locale: "id", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y", disableMobile: "true" };
        const dateInput = flatpickr("#tanggal", {
            ...flatpickrConfig,
            onChange: function(selectedDates, dateStr) {
                tanggalHijriyahFinal = dateStr ? convertToHijri(dateStr) : "";
                if(document.getElementById('cat_in').value === 'KAS PW') { document.getElementById('hijriInfo').textContent = tanggalHijriyahFinal ? `Hijriyah: ${tanggalHijriyahFinal}` : ""; }
            }
        });

        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
        document.getElementById('nominal').addEventListener('input', function() {
            let val = this.value.replace(/\D/g, ''); this.value = val ? new Intl.NumberFormat('id-ID').format(val) : '';
        });
        function toProperCase(str) { return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase()); }
        function convertToHijri(dateStr) {
            try {
                const date = new Date(dateStr);
                const formatter = new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const parts = formatter.formatToParts(date);
                return `${parts.find(p => p.type === 'day').value}/${parts.find(p => p.type === 'month').value}/${parts.find(p => p.type === 'year').value.match(/\d+/)[0]}`;
            } catch (err) { return ""; }
        }

        // --- SISTEM DROPDOWN DINAMIS (PARADOKS SOLVER) ---
        const bulanHijriyah = [
            { val: '1/48', label: 'Bulan 1 (Muharram 1448)' }, { val: '2/48', label: 'Bulan 2 (Shafar 1448)' }, { val: '3/48', label: 'Bulan 3 (R. Awal 1448)' },
            { val: '4/48', label: 'Bulan 4 (R. Tsani 1448)' }, { val: '5/48', label: 'Bulan 5 (J. Ula 1448)' }, { val: '6/48', label: 'Bulan 6 (J. Tsani 1448)' },
            { val: '7/48', label: 'Bulan 7 (Rajab 1448)' }, { val: '8/48', label: 'Bulan 8 (Sya\'ban 1448)' }, { val: '9/48', label: 'Bulan 9 (Ramadhan 1448)' },
            { val: '10/48', label: 'Bulan 10 (Syawal 1448)' }, { val: '11/48', label: 'Bulan 11 (Dzul Qo\'dah 1448)' }, { val: '12/48', label: 'Bulan 12 (Dzul Hijjah 1448)' }
        ];

        const bulanMasehi = [
            { val: '/05/2026', label: 'Mei 2026' }, { val: '/06/2026', label: 'Juni 2026' }, { val: '/07/2026', label: 'Juli 2026' },
            { val: '/08/2026', label: 'Agustus 2026' }, { val: '/09/2026', label: 'September 2026' }, { val: '/10/2026', label: 'Oktober 2026' },
            { val: '/11/2026', label: 'November 2026' }, { val: '/12/2026', label: 'Desember 2026' }, { val: '/01/2027', label: 'Januari 2027' }
        ];

        let optionsData = {
            'cat_in': [ { val: 'KAS PW', label: 'BUKU KAS OPRASIONAL' }, { val: 'KAS MOBIL', label: 'BUKU KAS ARMADA' } ],
            'cat_out': [ { val: 'KAS PW', label: 'KAS OPRASIONAL' }, { val: 'KAS MOBIL', label: 'KAS ARMADA' }, { val: 'KAS PW & MOBIL', label: 'KAS OPRASIONAL & ARMADA (GABUNGAN)' } ],
            'bulanSheet': bulanHijriyah
        };

        function adaptParadoxUI() {
            if(document.getElementById('cat_in').value === 'KAS MOBIL') { document.getElementById('hijriInfo').style.display = 'none'; } 
            else { document.getElementById('hijriInfo').style.display = 'block'; if(tanggalHijriyahFinal) document.getElementById('hijriInfo').textContent = `Hijriyah: ${tanggalHijriyahFinal}`; }

            const catOut = document.getElementById('cat_out').value;
            const wrapperBulan = document.getElementById('wrapper_bulanSheet');
            const triggerBulan = document.getElementById('trigger_bulanSheet');

            if (catOut === 'KAS MOBIL') {
                wrapperBulan.style.display = 'block';
                optionsData['bulanSheet'] = bulanMasehi;
                if(!document.getElementById('bulanSheet').value.startsWith('/')) {
                    document.getElementById('bulanSheet').value = '/07/2026';
                    triggerBulan.textContent = 'Juli 2026';
                }
            } else if (catOut === 'KAS PW & MOBIL') {
                wrapperBulan.style.display = 'none'; // Sembunyikan bulan karena paradoks
            } else {
                wrapperBulan.style.display = 'block';
                optionsData['bulanSheet'] = bulanHijriyah;
                if(document.getElementById('bulanSheet').value.startsWith('/')) {
                    document.getElementById('bulanSheet').value = '2/48';
                    triggerBulan.textContent = 'Bulan 2 (Shafar 1448)';
                }
            }
        }

        function openModal(targetId, title) {
            const modal = document.getElementById('customModal'); document.getElementById('modalTitle').textContent = title;
            const optionsContainer = document.getElementById('modalOptions'); optionsContainer.innerHTML = '';
            optionsData[targetId].forEach(opt => {
                let div = document.createElement('div'); div.className = 'modal-option'; div.textContent = opt.label;
                div.onclick = function() {
                    document.getElementById(targetId).value = opt.val; document.getElementById('trigger_' + targetId).textContent = opt.label;
                    modal.style.display = 'none'; adaptParadoxUI();
                    if(targetId === 'cat_out' || targetId === 'bulanSheet') fetchData();
                };
                optionsContainer.appendChild(div);
            });
            modal.style.display = 'flex';
        }
        function closeModal(e) { if(e.target === document.getElementById('customModal')) document.getElementById('customModal').style.display = 'none'; }

        function switchTab(tab) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            if(tab === 'input') {
                document.getElementById('viewInput').classList.add('active'); document.getElementById('navInputBtn').classList.add('active');
                document.getElementById('pageTitle').textContent = "Input Kas";
                let currentOut = document.getElementById('cat_out').value;
                if(currentOut === 'KAS PW & MOBIL') {
                    document.getElementById('cat_in').value = 'KAS PW'; document.getElementById('trigger_cat_in').textContent = 'Buku Kas PW';
                } else {
                    document.getElementById('cat_in').value = currentOut; document.getElementById('trigger_cat_in').textContent = optionsData.cat_in.find(o => o.val === currentOut).label;
                }
            } else {
                document.getElementById('viewRiwayat').classList.add('active'); document.getElementById('navRiwayatBtn').classList.add('active');
                document.getElementById('pageTitle').textContent = "Riwayat & Ringkasan";
                let inVal = document.getElementById('cat_in').value; document.getElementById('cat_out').value = inVal;
                document.getElementById('trigger_cat_out').textContent = optionsData.cat_out.find(o => o.val === inVal).label;
                fetchData(); 
            }
            adaptParadoxUI(); window.scrollTo(0, 0); 
        }

        function fetchData() {
            if(!navigator.onLine) { document.getElementById('historyList').innerHTML = '<div style="padding:20px; text-align:center; color:red; font-size:14px; background:white; border-radius:12px;">Anda sedang offline.</div>'; return; }
            document.getElementById('historyList').innerHTML = '<div style="padding:20px; text-align:center; color:gray; font-size:14px; background:white; border-radius:12px;">Mengambil data...</div>';
            
            const reqData = { action: 'getData', kategori: document.getElementById('cat_out').value, targetSheet: document.getElementById('bulanSheet').value };
            fetch(URL_APPS_SCRIPT, { method: 'POST', body: JSON.stringify(reqData), headers: { 'Content-Type': 'text/plain;charset=utf-8' } })
            .then(res => res.json())
            .then(result => {
                if(result.status === 'success') {
                    backendSummary = result.summary; rawHistoryData = result.history; renderHistory();
                } else { document.getElementById('historyList').innerHTML = `<div style="padding:20px; text-align:center; color:red; font-size:14px; background:white; border-radius:12px;">${result.message}</div>`; }
            }).catch(e => { document.getElementById('historyList').innerHTML = '<div style="padding:20px; text-align:center; color:red; font-size:14px; background:white; border-radius:12px;">Gagal terhubung.</div>'; });
        }

        function renderHistory() {
            const listContainer = document.getElementById('historyList'); listContainer.innerHTML = '';
            const catOut = document.getElementById('cat_out').value;
            let filteredData = rawHistoryData;
            
            // Logika Pintar: Filter khusus Kas Mobil secara Frontend
            if (catOut === 'KAS MOBIL') {
                const filterMasehi = document.getElementById('bulanSheet').value; // Contoh: '/07/2026'
                filteredData = rawHistoryData.filter(item => item.tanggal.includes(filterMasehi));
                
                // Menghitung ulang Summary khusus bulan Masehi yang dipilih
                let mIn = 0; let mOut = 0; let mSaldo = 0;
                filteredData.forEach(item => { mIn += item.masuk; mOut += item.keluar; });
                if(filteredData.length > 0) mSaldo = filteredData[filteredData.length - 1].saldo; // Saldo dari transaksi paling akhir
                
                document.getElementById('sumMasuk').textContent = formatRp(mIn);
                document.getElementById('sumKeluar').textContent = formatRp(mOut);
                document.getElementById('sumSaldo').textContent = formatRp(mSaldo);
            } else {
                // Untuk Kas PW dan Gabungan, gunakan perhitungan mutlak dari backend
                document.getElementById('sumMasuk').textContent = formatRp(backendSummary.pemasukan);
                document.getElementById('sumKeluar').textContent = formatRp(backendSummary.pengeluaran);
                document.getElementById('sumSaldo').textContent = formatRp(backendSummary.saldo);
            }

            // Urutkan List (Terbaru di atas)
            if (catOut !== 'KAS PW & MOBIL') {
                filteredData.sort((a, b) => {
                     let dA = a.tanggal.split('/').reverse().join(''); let dB = b.tanggal.split('/').reverse().join('');
                     return dA.localeCompare(dB);
                });
            }

            if(filteredData.length === 0) { listContainer.innerHTML = '<div style="padding:20px; text-align:center; color:gray; font-size:14px; background:white; border-radius:12px;">Tidak ada transaksi di bulan ini.</div>'; return; }

            filteredData.reverse().forEach(item => {
                const isMasuk = item.masuk > 0; const amt = formatRp(isMasuk ? item.masuk : item.keluar);
                listContainer.innerHTML += `
                    <div class="history-item">
                        <div class="history-info"><p>${toProperCase(item.uraian)}</p><small>${item.tanggal}</small></div>
                        <div class="history-amount ${isMasuk ? 'text-masuk' : 'text-keluar'}">${isMasuk ? '+' : '-'}${amt}</div>
                    </div>`;
            });
        }

        document.getElementById('kasForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const rawDateStr = document.getElementById('tanggal').value; 
            if (!rawDateStr) return alert('Pilih tanggal terlebih dahulu.');
            const isMobil = document.getElementById('cat_in').value === 'KAS MOBIL';
            let finalTanggalInput = "";
            if (isMobil) {
                const dateObj = new Date(rawDateStr);
                finalTanggalInput = `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth()+1).padStart(2, '0')}/${dateObj.getFullYear()}`;
            } else {
                if (!tanggalHijriyahFinal) return alert('Gagal memformat tanggal Hijriyah.');
                finalTanggalInput = tanggalHijriyahFinal;
            }

            const rawNominal = document.getElementById('nominal').value.replace(/\./g, ''); const btn = document.getElementById('btnSimpan');
            const data = {
                action: 'insert', kategori: document.getElementById('cat_in').value, tanggal: finalTanggalInput, 
                uraian: toProperCase(document.getElementById('uraian').value), jenis: document.querySelector('input[name="jenis"]:checked').value, nominal: Number(rawNominal)
            };

            if (navigator.onLine) {
                btn.textContent = "Menyimpan..."; btn.disabled = true;
                fetch(URL_APPS_SCRIPT, { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'text/plain;charset=utf-8' } })
                .then(res => res.json())
                .then(res => {
                    if (res.status === 'success') {
                        alert('Berhasil disimpan!');
                        document.getElementById('uraian').value = ""; document.getElementById('nominal').value = "";
                        document.querySelector('input[name="jenis"]:checked').checked = false;
                    } else { alert('Error: ' + res.message); }
                })
                .finally(() => { btn.textContent = "Simpan Transaksi"; btn.disabled = false; });
            }
        });

        window.addEventListener('online', () => { document.getElementById('statusJaringan').textContent = 'Online'; document.getElementById('statusJaringan').className = "status-online"; });
        window.addEventListener('offline', () => { document.getElementById('statusJaringan').textContent = 'Offline'; document.getElementById('statusJaringan').className = "status-offline"; });
        
        checkSession(); // Jalankan saat awal
    </script>
</body>
</html>
