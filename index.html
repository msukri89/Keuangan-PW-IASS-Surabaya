<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas PW 1448</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; background-color: #f8f9fa;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, button { width: 100%; padding: 10px; box-sizing: border-box; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; padding: 12px; margin-top: 10px; }
        button:disabled { background-color: #6c757d; }
        .radio-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-group input { width: auto; transform: scale(1.2); }
        #statusJaringan { padding: 10px; text-align: center; margin-bottom: 15px; border-radius: 4px; font-weight: bold; }
        #hijriInfo { display: block; margin-top: 5px; font-size: 14px; color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div id="statusJaringan" style="background-color: #d4edda; color: #155724;">Status: Online</div>
    
    <h2 style="text-align: center; color: #333;">Input Kas Baru</h2>
    
    <form id="kasForm">
        <div class="form-group">
            <label>Tanggal:</label>
            <!-- Input popup kalender masehi bawaan HP -->
            <input type="date" id="tanggal" required>
            <!-- Menampilkan hasil konversi otomatis -->
            <span id="hijriInfo"></span>
        </div>
        <div class="form-group">
            <label>Uraian:</label>
            <input type="text" id="uraian" required placeholder="Contoh: Beli ATK">
        </div>
        <div class="form-group">
            <label>Jenis Transaksi:</label>
            <div class="radio-group">
                <input type="radio" id="masuk" name="jenis" value="masuk" required>
                <label for="masuk">Masuk (+)</label>
                <input type="radio" id="keluar" name="jenis" value="keluar">
                <label for="keluar">Keluar (-)</label>
            </div>
        </div>
        <div class="form-group">
            <label>Nominal (Rp):</label>
            <input type="number" id="nominal" required placeholder="Contoh: 50000">
        </div>
        <button type="submit" id="btnSimpan">Simpan Transaksi</button>
    </form>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbyZlyYAVIB3U9jV3BLZOLUS0bXyQaif0pW5v1kfqtmQ73-SREo-b_xFZPlWapuoPbhJtA/exec';

        let db;
        let tanggalHijriyahFinal = ""; 
        const request = indexedDB.open("KasDatabase", 1);

        request.onupgradeneeded = (event) => {
            db = event.target.result;
            db.createObjectStore("transaksiPending", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            updateStatusUI();
            syncData(); 
        };

        // Skrip Konversi Otomatis ke Hijriyah
        document.getElementById('tanggal').addEventListener('change', function() {
            if (!this.value) {
                document.getElementById('hijriInfo').textContent = "";
                tanggalHijriyahFinal = "";
                return;
            }
            
            try {
                const date = new Date(this.value);
                const formatter = new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura', {
                    day: '2-digit', month: '2-digit', year: 'numeric'
                });
                
                const parts = formatter.formatToParts(date);
                const d = parts.find(p => p.type === 'day').value;
                const m = parts.find(p => p.type === 'month').value;
                const y = parts.find(p => p.type === 'year').value.match(/\d+/)[0]; 

                tanggalHijriyahFinal = `${d}/${m}/${y}`;
                document.getElementById('hijriInfo').textContent = `Terkonversi ke Hijriyah: ${tanggalHijriyahFinal}`;
            } catch (err) {
                document.getElementById('hijriInfo').textContent = "Browser tidak mendukung konversi otomatis.";
                document.getElementById('hijriInfo').style.color = "red";
            }
        });

        // Proses Submit Form
        document.getElementById('kasForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (!tanggalHijriyahFinal) {
                alert('Tanggal belum dipilih atau gagal dikonversi.');
                return;
            }

            const btn = document.getElementById('btnSimpan');
            
            const data = {
                tanggal: tanggalHijriyahFinal, 
                uraian: document.getElementById('uraian').value,
                jenis: document.querySelector('input[name="jenis"]:checked').value,
                nominal: document.getElementById('nominal').value
            };

            if (navigator.onLine) {
                btn.textContent = "Menyimpan ke Sheets...";
                btn.disabled = true;
                kirimKeSheets(data, btn);
            } else {
                simpanKeLokal(data);
            }
        });

        function kirimKeSheets(data, btnElement = null, idLokal = null) {
            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    if (btnElement) {
                        alert('Berhasil disimpan ke Excel!');
                        document.getElementById('kasForm').reset();
                        document.getElementById('hijriInfo').textContent = "";
                    }
                    if (idLokal) hapusDataLokal(idLokal);
                } else {
                    alert('Gagal: ' + result.message);
                }
            })
            .catch(error => {
                if (btnElement) alert('Gagal terkirim. Data diamankan ke memori HP.');
                if (!idLokal) simpanKeLokal(data);
            })
            .finally(() => {
                if (btnElement) {
                    btnElement.textContent = "Simpan Transaksi";
                    btnElement.disabled = false;
                }
            });
        }

        function simpanKeLokal(data) {
            const transaction = db.transaction(["transaksiPending"], "readwrite");
            const store = transaction.objectStore("transaksiPending");
            store.add(data);
            alert("Internet terputus! Data disimpan di HP dan akan otomatis dikirim saat sinyal kembali.");
            document.getElementById('kasForm').reset();
            document.getElementById('hijriInfo').textContent = "";
        }

        function hapusDataLokal(id) {
            const transaction = db.transaction(["transaksiPending"], "readwrite");
            const store = transaction.objectStore("transaksiPending");
            store.delete(id);
        }

        function syncData() {
            if (!navigator.onLine) return;

            const transaction = db.transaction(["transaksiPending"], "readonly");
            const store = transaction.objectStore("transaksiPending");
            const req = store.getAll();

            req.onsuccess = () => {
                const antrean = req.result;
                if (antrean.length > 0) {
                    const statusEl = document.getElementById('statusJaringan');
                    statusEl.textContent = `Mengirim ${antrean.length} data antrean...`;
                    statusEl.style.backgroundColor = "#ffeeba";
                    statusEl.style.color = "#856404";
                    
                    antrean.forEach(data => {
                        kirimKeSheets(data, null, data.id);
                    });

                    setTimeout(updateStatusUI, 3000);
                }
            };
        }

        window.addEventListener('online', () => { updateStatusUI(); syncData(); });
        window.addEventListener('offline', updateStatusUI);

        function updateStatusUI() {
            const statusEl = document.getElementById('statusJaringan');
            if (navigator.onLine) {
                statusEl.textContent = 'Status: Online';
                statusEl.style.backgroundColor = '#d4edda';
                statusEl.style.color = '#155724';
            } else {
                statusEl.textContent = 'Status: Offline - Mode Simpan Lokal';
                statusEl.style.backgroundColor = '#f8d7da';
                statusEl.style.color = '#721c24';
            }
        }
    </script>
</body>
</html>
